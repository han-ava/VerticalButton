name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print Swift version
        run: swift --version

      - name: Resolve Swift Package
        run: swift package resolve

      - name: Build
        run: swift build --configuration release

      - name: Run tests
        run: swift test --parallel
