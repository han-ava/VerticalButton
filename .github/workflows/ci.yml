name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print Xcode / Swift info
        run: |
          xcodebuild -version
          swift --version

      - name: List xcodebuild schemes (debug)
        run: |
          xcodebuild -list -json > schemes.json || true
          cat schemes.json

      - name: Detect scheme (try shared schemes, then Package-name fallback)
        id: detect
        run: |
          # Try to get the first scheme from schemes.json
          SCHEME=$(python3 - <<'PY'
            import json,sys
            try:
                j=json.load(open('schemes.json'))
            except Exception:
                sys.exit(0)
            schemes=[]
            if isinstance(j.get('workspace'), dict):
                schemes += j['workspace'].get('schemes', [])
            if isinstance(j.get('project'), dict):
                schemes += j['project'].get('schemes', [])
            print(schemes[0] if schemes else '')
            PY
            )
          if [ -z "$SCHEME" ]; then
            # Try fallback: read package name and use "<PackageName>-Package"
            PACKAGE_NAME=$(swift package dump-package 2>/dev/null | python3 -c "import sys,json; j=json.load(sys.stdin) if not sys.stdin.isatty() else {}; print(j.get('name',''))")
            if [ -n "$PACKAGE_NAME" ]; then
              CAND="${PACKAGE_NAME}-Package"
              echo "Trying fallback scheme name: $CAND"
              # check if xcodebuild -list returns that scheme
              xcodebuild -list -json > /tmp/schemes_check.json || true
              HAS=$(python3 - <<'PY'
                import json,sys
                try:
                    j=json.load(open('/tmp/schemes_check.json'))
                except Exception:
                    print('0'); sys.exit(0)
                schemes=[]
                if isinstance(j.get('workspace'), dict):
                    schemes += j['workspace'].get('schemes', [])
                if isinstance(j.get('project'), dict):
                    schemes += j['project'].get('schemes', [])
                print('1' if "'''${CAND}'''" .strip("'") in schemes else '0')
                PY
                )
              if [ "$HAS" = "1" ]; then
                SCHEME="$CAND"
              fi
            fi
          fi
          if [ -z "$SCHEME" ]; then
            echo "No scheme found via xcodebuild -list -json and no Package fallback; will fall back to swift build for compile steps."
            echo "scheme=" >> $GITHUB_OUTPUT
          else
            echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
            echo "Detected scheme: $SCHEME"
          fi

      - name: Pick an available iOS Simulator (id) with preference
        id: sim
        run: |
          # Preferred models in order:
          python3 - <<'PY' > /tmp/pick_sim.py
          import json,sys
          try:
              j=json.load(sys.stdin)
          except Exception:
              sys.exit(0)
          prefs = ["iPhone 17","iPhone 17 Pro","iPhone 16","iPhone 16 Pro","iPhone 15","iPhone 14","iPhone SE (3rd generation)","iPhone SE (2nd generation)"]
          devices = j.get("devices", {})
          candidates = []
          for runtime, devs in devices.items():
              for d in devs:
                  if d.get("isAvailable") and "iPhone" in d.get("name",""):
                      # store (runtime, name, udid)
                      candidates.append((runtime, d.get("name"), d.get("udid")))
          udid = ""
          for p in prefs:
              for c in candidates:
                  if p in c[1]:
                      udid = c[2]
                      break
              if udid:
                  break
          if not udid and candidates:
              udid = candidates[0][2]
          if udid:
              print(udid)
          PY
          SIMID=$(xcrun simctl list devices available -j 2>/dev/null | python3 /tmp/pick_sim.py)
          if [ -z "$SIMID" ]; then
            echo "No available iPhone simulator found via simctl; testing/build will fallback accordingly."
            echo "simulator_id=" >> $GITHUB_OUTPUT
          else
            echo "simulator_id=$SIMID" >> $GITHUB_OUTPUT
            echo "Picked simulator id: $SIMID"
          fi

      - name: Build (xcodebuild if scheme found, else swift build fallback)
        env:
          SCHEME: ${{ steps.detect.outputs.scheme }}
          SIM_ID: ${{ steps.sim.outputs.simulator_id }}
        run: |
          if [ -n "$SCHEME" ]; then
            echo "Using xcodebuild with scheme: $SCHEME"
            if [ -n "$SIM_ID" ]; then
              echo "Using simulator id: $SIM_ID"
              xcodebuild -scheme "$SCHEME" -destination "id=$SIM_ID" clean build CODE_SIGNING_ALLOWED=NO
            else
              # try build without explicit destination (will build the scheme's supported platform)
              xcodebuild -scheme "$SCHEME" clean build CODE_SIGNING_ALLOWED=NO
            fi
          else
            echo "No Xcode scheme detected -- falling back to swift build"
            swift build --configuration release
          fi

      - name: Run tests (xcodebuild test if possible, else swift test if package has tests)
        env:
          SCHEME: ${{ steps.detect.outputs.scheme }}
          SIM_ID: ${{ steps.sim.outputs.simulator_id }}
        run: |
          if [ -n "$SCHEME" ] && [ -n "$SIM_ID" ]; then
            echo "Attempting xcodebuild test for scheme $SCHEME on simulator $SIM_ID"
            xcodebuild test -scheme "$SCHEME" -destination "id=$SIM_ID" CODE_SIGNING_ALLOWED=NO || {
              code=$?
              if [ "$code" -eq 66 ]; then
                echo "Scheme '$SCHEME' is not configured for test action; skipping xcodebuild tests."
                exit 0
              else
                echo "xcodebuild test failed with exit code $code"
                exit $code
              fi
            }
          else
            echo "No suitable Xcode scheme+simulator for xcodebuild test; attempting 'swift test' as fallback"
            swift test || echo "swift test failed or no tests present; continuing"
          fi
