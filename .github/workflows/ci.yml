name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print Xcode / Swift info
        run: |
          xcodebuild -version
          swift --version

      - name: List xcodebuild schemes (debug)
        run: |
          xcodebuild -list -json > schemes.json || true
          cat schemes.json

      - name: Detect scheme
        id: detect
        run: |
          cat > detect_scheme.py <<'PY'
          import json, sys
          try:
              j = json.load(open('schemes.json'))
          except Exception:
              sys.exit(0)
          schemes = []
          if isinstance(j.get('workspace'), dict):
              schemes += j['workspace'].get('schemes', [])
          if isinstance(j.get('project'), dict):
              schemes += j['project'].get('schemes', [])
          print(schemes[0] if schemes else '')
          PY
          SCHEME=$(python3 detect_scheme.py)
          rm -f detect_scheme.py
          if [ -z "$SCHEME" ]; then
            echo "No scheme found via xcodebuild -list -json"
            exit 1
          fi
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT

      - name: Build for iOS Simulator
        env:
          SCHEME: ${{ steps.detect.outputs.scheme }}
        run: |
          echo "Using scheme: $SCHEME"
          xcodebuild -scheme "$SCHEME" \
                     -destination 'platform=iOS Simulator,name=iPhone 17' \
                     clean build CODE_SIGNING_ALLOWED=NO
