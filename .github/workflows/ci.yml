name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print Xcode / Swift info
        run: |
          xcodebuild -version
          swift --version

      - name: List xcodebuild schemes (debug)
        run: |
          xcodebuild -list -json || true

      - name: Detect scheme
        id: detect
        run: |
          SCHEME=$(xcodebuild -list -json | python3 - <<'PY'
import sys,json
try:
    j=json.load(sys.stdin)
except:
    print("")
    sys.exit(0)
schemes=[]
if isinstance(j.get("workspace"), dict):
    schemes += j["workspace"].get("schemes", [])
if isinstance(j.get("project"), dict):
    schemes += j["project"].get("schemes", [])
print(schemes[0] if schemes else "")
PY
)
          if [ -z "$SCHEME" ]; then
            echo "No scheme found via xcodebuild -list -json"
            exit 1
          fi
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT

      - name: Build for iOS Simulator
        env:
          SCHEME: ${{ steps.detect.outputs.scheme }}
        run: |
          echo "Using scheme: $SCHEME"
          xcodebuild -scheme "$SCHEME" \
                     -destination 'platform=iOS Simulator,name=iPhone 14,OS=17.0' \
                     clean build CODE_SIGNING_ALLOWED=NO

      - name: Run tests on iOS Simulator
        env:
          SCHEME: ${{ steps.detect.outputs.scheme }}
        run: |
          echo "Testing scheme: $SCHEME"
          xcodebuild test -scheme "$SCHEME" \
                          -destination 'platform=iOS Simulator,name=iPhone 14,OS=17.0' \
                          CODE_SIGNING_ALLOWED=NO
