name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print Xcode / Swift info
        run: |
          xcodebuild -version
          swift --version

      - name: List Xcodebuild schemes (for debug)
        run: |
          # For Swift Packages, Xcode generates a package scheme named "<PackageName>-Package".
          # Listing schemes helps if the scheme name is different in the runner.
          xcodebuild -list -json || true

      - name: Build for iOS Simulator
        run: |
          # build the Swift Package using Xcode targeting the iOS Simulator
          xcodebuild -scheme "VerticalButton-Package" \
                     -destination 'platform=iOS Simulator,name=iPhone 14,OS=17.0' \
                     clean build

      - name: Run tests on iOS Simulator
        run: |
          # run tests (if there are none this will report no tests)
          xcodebuild test -scheme "VerticalButton-Package" \
                          -destination 'platform=iOS Simulator,name=iPhone 14,OS=17.0'
